<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор досудебной претензии</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e9ecef;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 { color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 10px; }
        
        /* Стили формы */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; }

        /* Кнопки */
        .actions { display: flex; gap: 10px; margin-bottom: 30px; }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-generate { background-color: #1e3a8a; color: white; }
        .btn-copy { background-color: #10b981; color: white; display: none; }
        button:hover { opacity: 0.9; }

        /* Стили «Листа бумаги» для Word */
        #paper {
            display: none;
            background: white;
            border: 1px solid #ddd;
            padding: 60px 80px; /* Поля как в Word */
            font-family: "Times New Roman", Times, serif;
            font-size: 14pt; /* Стандартный размер в Word */
            line-height: 1.5;
            color: black;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-height: 400px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* Выравнивание шапки в предпросмотре */
        .header-block {
            margin-left: 50%; /* Смещение шапки вправо */
            margin-bottom: 40px;
        }
        .title-block {
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Инструмент формирования претензии</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>ФИО правообладателя:</label>
            <input type="text" id="fio" placeholder="Иванов Иван Иванович">
        </div>
        <div class="form-group">
            <label>Email для ответа:</label>
            <input type="text" id="email" placeholder="example@mail.ru">
        </div>
        <div class="form-group">
            <label>Домен сайта-нарушителя:</label>
            <input type="text" id="site" placeholder="pirat-site.com">
        </div>
        <div class="form-group">
            <label>Название произведения:</label>
            <input type="text" id="content" placeholder="Статья «Мой проект»">
        </div>
    </div>
    <div class="form-group" style="margin-bottom: 20px;">
        <label>Полная ссылка (URL) на нарушение:</label>
        <input type="text" id="url" placeholder="https://pirat-site.com/page1">
    </div>

    <div class="actions">
        <button class="btn-generate" onclick="generate()">Сформировать</button>
        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Копировать для Word</button>
    </div>

    <div id="paper"></div>
</div>

<script>
    function generate() {
        const data = {
            fio: document.getElementById('fio').value || '________________',
            email: document.getElementById('email').value || '________________',
            site: document.getElementById('site').value || '________________',
            content: document.getElementById('content').value || '________________',
            url: document.getElementById('url').value || '________________',
            date: new Date().toLocaleDateString('ru-RU')
        };

        // Формируем текст с правильными отступами для Word
        // Шапка (50% ширины обычно хватает для имитации правого края в plain text)
        const text = `Кому: Владельцу сайта ${data.site}\nОт кого: ${data.fio}\nEmail: ${data.email}\n\n\n` +
        `ДОСУДЕБНАЯ ПРЕТЕНЗИЯ\n` +
        `(о прекращении нарушения авторских прав)\n\n` +
        `Мною, ${data.fio}, обнаружено, что на интернет-сайте ${data.site} по адресу ${data.url} размещен объект авторского права: ${data.content}.\n\n` +
        `Указанное произведение используется без моего согласия, что нарушает ст. 1229 ГК РФ. На основании ст. 1252 ГК РФ и ст. 15.2 ФЗ № 149-ФЗ, ТРЕБУЮ в течение 24 часов удалить указанный контент.\n\n` +
        `В противном случае я обращусь в Московский городской суд для блокировки ресурса и взыскания компенсации по ст. 1301 ГК РФ (от 10 000 до 5 000 000 рублей).\n\n\n` +
        `Дата: ${data.date} г.             Подпись: ___________ / ${data.fio}`;

        const paper = document.getElementById('paper');
        paper.innerText = text;
        paper.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'inline-block';
    }

    async function copyToClipboard() {
        const text = document.getElementById('paper').innerText;
        try {
            await navigator.clipboard.writeText(text);
            alert('Текст скопирован! Теперь откройте Word и нажмите Ctrl+V.\nШрифт в Word автоматически установится как основной (обычно Calibri или Times New Roman).');
        } catch (err) {
            alert('Ошибка копирования');
        }
    }
</script>

</body>
</html>
